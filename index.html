.rbtn{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--edit);background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:7px 13px;transition:border-color .15s}

.sub{font-size:11px;color:var(--muted);margin-top:4px;font-family:var(--mono)}

.wcap{font-size:10.5px;color:var(--dim);margin:0 0 10px}

.tick{font-family:var(--mono);font-size:22px;font-weight:700;letter-spacing:.02em}

 L("universe ≥104 names + grid tier",ALL.length>=104&&TIERS.grid.length>=12,ALL.length);
 L("PATHD: 85+ names × 44 daily coded",Object.keys(PATHD).length>=85&&Object.values(PATHD).every(p=>p.m.length===44&&p.c.length===44),Object.keys(PATHD).length);
 const lm=PATHD.MRVL.m[43];
 L("path ordering bear≤base≤bull @d44",lm[0]<=lm[1]&&lm[1]<=lm[2],lm.join("/"));
 L("MRVL day codes: print+digestion present",PATHD.MRVL.c.includes("P")&&PATHD.MRVL.c.includes("D"),PATHD.MRVL.c);
 L("honest pie: NVDA tops, NVTS eff<1",Math.abs(effSlice("NVDA")-7.54)<0.03&&effSlice("NVTS")<1,effSlice("NVDA")+"/"+effSlice("NVTS"));
 L("mesh view renders 80+ rows",vMesh().length>4000&&vMesh().includes("VRT"));
 const mpT=meshPath("MRVL");
 L("mesh path sane (1y=px×M, 90d between)",mpT&&Math.abs(mpT.y1-274*MULT.MRVL)<0.6&&mpT.d90>274&&mpT.d90<mpT.y1,mpT&&`1y ${mpT.y1} · 90d ${mpT.d90}`);
 Object.assign(DB.MRVL,{mode:sn2.mode,atrPct:sn2.atrPct,px:sn2.px,state:sn2.state});DB.MRVL.tgt=sn2.tgt;
 // connectivity probes (device truth)
 const probe=async(name,fn)=>{const t0=Date.now();try{await fn();return{name,ok:true,ms:Date.now()-t0}}catch(e){return{name,ok:false,ms:Date.now()-t0}}};
 const tiny="https://query1.finance.yahoo.com/v8/finance/chart/AAPL?range=1d&interval=1d";
 const probes=await Promise.all([
  probe("relay corsproxy",()=>fetchOnce(PROXIES[0](tiny),6000)),
  probe("relay allorigins",()=>fetchOnce(PROXIES[1](tiny),6000)),
  probe("relay codetabs",()=>fetchOnce(PROXIES[2](tiny),6000)),
  probe("spark batch",()=>getJSON("https://query1.finance.yahoo.com/v8/finance/spark?symbols=AAPL,MSFT&range=1d&interval=1d")),
  probe("cboe chain (direct)",()=>fetchOnce("https://cdn.cboe.com/api/global/delayed_quotes/options/AAPL.json",6000)),
 ]);
 TESTRES.net=probes;TESTRES.running=false;paint();
}
function testPanel(){
 if(!TESTRES)return `<button class="ldbtn" onclick="systemTest()">run system test — logic + connectivity</button>`;
 const lg=TESTRES.logic.map(x=>`<div style="font-family:var(--mono);font-size:11px;color:${x.ok?'var(--go)':'var(--ext)'}">${x.ok?'✓':'✗'} ${x.name}${x.d?' · '+x.d:''}</div>`).join("");
 const nt=TESTRES.running?'<div class="mono" style="font-size:11px;color:var(--dim)">probing relays…</div>'
  :TESTRES.net.map(x=>`<div style="font-family:var(--mono);font-size:11px;color:${x.ok?'var(--go)':'var(--ext)'}">${x.ok?'✓':'✗'} ${x.name} · ${x.ms}ms</div>`).join("");
 const lok=TESTRES.logic.every(x=>x.ok);
 return `<div class="rule" style="border-left-color:${lok?'var(--go)':'var(--ext)'}"><b>SYSTEM TEST</b><br>${lg}<div style="margin-top:6px"><b style="font-size:11px">connectivity (your device):</b></div>${nt}<button class="ldbtn" onclick="systemTest()">re-run</button></div>`;
}
function vRules(){
 return testPanel()+`<div class="rule" style="border-left-color:var(--edit)"><b>ASSUMPTION REGISTER — locked Jul 7 (Locked_Assumptions_Event_Chain.md).</b> A1 wave rhymes (kill: any hyperscaler CUTS capex Jul 28–31 → all M ×0.7) · A2 scarcity survives Meta-Compute (kill: a 2nd defector) · A3 Rubin ramp CONF, July ships · A4 lead ≈15td (kill: no coils by T−10 on 3+ names) · A5 rotation anchor→attach→component, 5–8d lag (kill: components rally alone = froth) · A6 digestion 38–50% / 5–8 sessions (kill: >61.8% = downtrend) · A7 NVTS 800V in shipped racks (kill: Q4 teardown sweep by ST/TI/Infineon) · A8 memory tight (kill: HBM price cuts) · A9 Warsh holds Jul 29 (kill: hike → M ×0.7) · A10 correction not regime-end (kill: SMH −20% weekly). Phases: 0 digest Jul 7–18 · 1 proof Jul 20–31 · 2 rotation Aug 3–14 · 3 referendum Aug 17–Sep 3 (NVDA Aug 26).</div>
 <div class="rule"><b>How this app works (fully standalone).</b> Tap ⟳: it fetches delayed prices + 1y history per name through public relay endpoints, runs the breakout scanner in your browser, sets states, and auto-derives each name's bear/base/bull from its own volatility. Open a name → "load live option chain" prices setups off the real (delayed) CBOE chain. No terminal, no install. Share the file itself — it carries the whole system.</div>
 <div class="rule"><b>The two-layer gate.</b> Thesis-ready (dated catalyst ≤45d) × COILED (scanner) = GO. One layer alone = watch, never a position.</div>
 <div class="rule" style="border-left-color:var(--vio)"><b>MESH tab — the anti-hyperfocus instrument.</b> Every name's slice of the wave (its share of the future's resource-cost reduction) × capture (the odds it banks that share against competitors). The solid violet bar is what deserves attention; the hatched tail is the contested part. NVTS after the honest expansion: slice 1.74% (energy names its full cast — grid tier VRT/GEV/ETN/VST/CEG, silicon ON/STM/TXN/ADI, plus unlisted phantoms), capture 0.50 → EFF 0.87%, rank #17. Its MULT stays 3.0× — torque #1, sizing #17. EFF sizes; MULT measures the move; the gate times. Vision ranks; the gate times; you size.</div>
 <div class="rule"><b>MY TARGET mode.</b> Per name, switch scenarios → my target: enter the price you predict and a window in days (a week, 90 days — yours). Every expiry is evaluated: ones shorter than your window are coverage-weighted by √(covered/window) — the first-passage odds that an early breakout (smart money front-running the catalyst) already touched your target — shown as cov % per row. R3 compares duration to your window; IV crush applies only if a dated catalyst burns inside the covered stretch; bull/base/bear become target-hit / drift-progress / vol-scaled-wrong. The weights row then reads as: how confident am I in my own call. The σ line grades your prediction against the stock's own volatility — 2σ+ means you're implicitly claiming a catalyst-class move.</div>
 <div class="rule"><b>Your three numbers per name.</b> bear/base/bull = the price moves you believe the catalyst can produce. Auto-seeded from live volatility; edit them and watch every EV, P(win), grade and the Brief's BEST column move. The weights row (top of Brief) = how likely you think each case is.</div>
 <div class="rule"><b>R3 · duration ≥ 3× lead.</b> R3⚠ rows are flagged breaches — weeklies can't hold a 1-month lead.</div>
 <div class="rule"><b>R4 · sleeves.</b> LOTTO + undated stories ≤5% total, never refilled. Catalyst sleeve ≤30% aggregate premium.</div>
 <div class="rule"><b>R5 · the news is the exit.</b> Sell 50% into first strength; the post-catalyst flip to EXTENDED is take-profit confirmation, never an add.</div>
 <div class="rule"><b>R6/R8/R9.</b> Commissions ≤1%/mo; journal every exit; two dead catalyst cycles → shares-only.</div>
 <div class="rule" style="border-left-color:var(--ext)"><b>Honest limits.</b> Data is delayed public data via third-party relays — they can throttle or die (three fallbacks built in; the old Termux feed still works as a backup and is auto-merged if present). Model EVs are outputs of YOUR scenarios, not forecasts. The app names and grades; you size. Not investment advice.</div>`}
function paint(){
 const v=document.getElementById("view");
 v.classList.remove("enter");
 v.innerHTML=VIEW==="brief"?vBrief():VIEW==="name"?vName():VIEW==="mesh"?vMesh():VIEW==="cal"?vCal():vRules();
 void v.offsetWidth; v.classList.add("enter");
 ["nb","nm","nc","nr"].forEach(id=>{const e=document.getElementById(id);if(e)e.classList.remove("on")});
 const nid=VIEW==="mesh"?"nm":VIEW==="cal"?"nc":VIEW==="rules"?"nr":"nb";
 const ne=document.getElementById(nid); if(ne)ne.classList.add("on");
 window.scrollTo(0,0)}
window.setPx=(t,v)=>{const x=parseFloat(v);if(x>0){DB[t].px=x;DB[t].conf="LIVE";paint()}};
window.setIV=(t,v)=>{const x=parseFloat(v);if(x>0){DB[t].iv=x;paint()}};
window.setCr=(t,v)=>{const x=parseFloat(v);if(x>0){DB[t].crush=x;paint()}};
window.setScn=(t,k,v)=>{const x=parseFloat(v);if(!isNaN(x)){DB[t].scn[k]=x;DB[t].touched=true;paint()}};
window.useMeshTgt=(t)=>{const mp=meshPath(t);if(!mp)return;
 DB[t].mode="TGT";DB[t].tgt={px:mp.y1,days:365};paint()};
window.setTgtPx=(t,v)=>{const x=parseFloat(v);DB[t].tgt.px=x>0?x:null;paint()};
window.setTgtDays=(t,v)=>{const x=parseInt(v);DB[t].tgt.days=(x>0&&x<=730)?x:null;paint()};
function tgtSanity(t){
 const n=DB[t];
 if(!(n.tgt.px>0&&n.tgt.days>0&&n.px))return "enter a target price and a window in days — every expiry is then coverage-weighted: shorter ones CAN catch an early breakout (smart money front-runs), they just cover less of your window (cov % on each row).";
 const mv=(n.tgt.px/n.px-1)*100;const d=Math.max(1,n.tgt.days);
 const atr=n.atrPct||3;const z=Math.abs(mv)/(atr*Math.sqrt(d));
 const verdict=z<=1?"modest vs this name's own volatility":z<=2?"bold — beyond typical drift":"heroic — needs a catalyst-class event";
 const c=CAT[t];const burns=c&&c[0]&&D(c[0])>TODAY&&D(c[0])<=tgtDate(t);
 return `implies ${mv>=0?"+":""}${mv.toFixed(1)}% in ${d}d · ${z.toFixed(1)}σ vs own vol → <b>${verdict}</b>${burns?" · catalyst burns before your date (IV crush applied)":" · no dated catalyst before your date (no crush assumed)"}`;
}
window.setW=(k,v)=>{const x=Math.max(0,parseFloat(v)||0);W[k]=x;const s=W.bear+W.base+W.bull||1;W={bear:W.bear/s,base:W.base/s,bull:W.bull/s};paint()};
if(window.FEED&&FEED.quotes&&Object.keys(FEED.quotes).length){
 const tg=document.getElementById("feedtag");tg.textContent="LIVE";tg.className="feedtag live";
 setHdr("feed "+FEED.asof+" merged · tap ⟳ for fresh in-app data");
}
paint();
