<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0B0E14">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>IrfTek</title>
<style>
:root{--void:#0A0D13;--panel:#121826;--panel2:#0E1420;--line:#1C2436;--line2:#26304A;
--ink:#EAEEF6;--muted:#8D97AC;--dim:#59647A;
--coil:#E8B44C;--go:#3FC98C;--ext:#E5534B;--edit:#59C6E8;--repair:#7A8CC8;--vio:#9D8CFF;
--mono:ui-monospace,"SF Mono","Cascadia Mono","Roboto Mono",Menlo,Consolas,monospace;
--sys:-apple-system,system-ui,"Segoe UI",Roboto,sans-serif;
--r:12px;--r2:16px;}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{background:var(--void);color:var(--ink);font-family:var(--sys);font-size:15px;line-height:1.5;padding-bottom:76px;font-variant-numeric:tabular-nums}
.mono{font-family:var(--mono)}
.eyebrow{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--dim)}
::selection{background:rgba(232,180,76,.25)}
:focus-visible{outline:2px solid var(--edit);outline-offset:2px;border-radius:6px}
header{position:sticky;top:0;z-index:20;background:linear-gradient(var(--void) 78%,transparent);padding:14px 16px 8px;backdrop-filter:blur(2px)}
h1{font-family:var(--mono);font-size:15px;letter-spacing:.1em;display:flex;align-items:center;gap:10px}
h1 span.t{color:var(--coil)}
.feedtag{font-family:var(--mono);font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;letter-spacing:.06em}
.feedtag.live{background:rgba(63,201,140,.14);color:var(--go);box-shadow:inset 0 0 0 1px rgba(63,201,140,.25)}
.feedtag.seed{background:rgba(232,180,76,.12);color:var(--coil);box-shadow:inset 0 0 0 1px rgba(232,180,76,.22)}
.rbtn{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--edit);background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:7px 13px;transition:border-color .15s}
.rbtn:active{border-color:var(--edit)}
.sub{font-size:11px;color:var(--muted);margin-top:4px;font-family:var(--mono)}
main{padding:6px 14px}
@media(prefers-reduced-motion:no-preference){
 #view.enter>*{animation:rise .28s cubic-bezier(.2,.7,.3,1) both}
 #view.enter>*:nth-child(2){animation-delay:.03s}#view.enter>*:nth-child(3){animation-delay:.06s}
 #view.enter>*:nth-child(4){animation-delay:.09s}#view.enter>*:nth-child(5){animation-delay:.12s}
 #view.enter>*:nth-child(6){animation-delay:.15s}
 @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}}
nav{position:fixed;bottom:0;left:0;right:0;display:flex;background:rgba(14,20,32,.92);backdrop-filter:blur(10px);border-top:1px solid var(--line);z-index:30}
nav button{flex:1;position:relative;background:none;border:none;color:var(--dim);font-family:var(--mono);font-size:10.5px;font-weight:700;letter-spacing:.1em;padding:14px 0 max(14px,env(safe-area-inset-bottom))}
nav button.on{color:var(--coil)}
nav button.on::after{content:"";position:absolute;top:0;left:26%;right:26%;height:2px;background:var(--coil);border-radius:0 0 3px 3px}
.chips{display:flex;gap:7px;margin:10px 0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto;font-family:var(--mono);font-size:10.5px;font-weight:600;padding:7px 13px;border-radius:999px;border:1px solid var(--line);color:var(--muted);background:var(--panel2);transition:all .15s}
.chip.on{border-color:var(--edit);color:#0A0D13;background:var(--edit)}
.search{width:100%;font-family:var(--mono);font-size:13px;background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:10px 13px;color:var(--ink);margin:2px 0 8px}
.search::placeholder{color:var(--dim)}
.row{display:flex;align-items:center;gap:8px;background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:11px 12px;margin-bottom:8px;transition:transform .1s,border-color .15s}
.row:active{transform:scale(.985);border-color:var(--line2)}
.row .tk{font-family:var(--mono);font-weight:700;font-size:14.5px;width:54px}
.row .px{font-family:var(--mono);font-size:12px;color:var(--muted);width:58px;text-align:right}
.row .st{font-family:var(--mono);font-size:9px;font-weight:700;padding:4px 6px;border-radius:6px;width:66px;text-align:center;letter-spacing:.02em}
.row .gt{font-family:var(--mono);font-size:9.5px;font-weight:700;padding:4px 8px;border-radius:6px;letter-spacing:.02em}
.row .bs{font-family:var(--mono);font-size:10.5px;width:72px;text-align:right}
.row .cd{font-size:10px;color:var(--dim);flex:1;text-align:right;font-family:var(--mono)}
.sC{background:rgba(63,201,140,.14);color:var(--go)} .sB{background:rgba(232,180,76,.13);color:var(--coil)}
.sE{background:rgba(229,83,75,.14);color:var(--ext)} .sN{background:rgba(141,151,172,.12);color:var(--muted)} .sV{background:rgba(122,140,200,.14);color:var(--repair)}
.gGO{background:rgba(63,201,140,.2);color:var(--go)} .gTG{background:rgba(89,198,232,.16);color:var(--edit)} .gWS{background:rgba(63,201,140,.1);color:#8fd9b6}
.gWP{background:rgba(232,180,76,.16);color:var(--coil)} .gPO,.gTO{background:rgba(141,151,172,.12);color:var(--muted)}
.gSD,.gND,.gNP{background:rgba(89,100,122,.12);color:var(--dim)}
.wrow{display:flex;gap:8px;align-items:flex-end;margin:6px 0 4px}
.wrow label{flex:1;font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.1em;font-weight:700}
.wrow input{font-family:var(--mono);width:100%;font-size:12.5px;background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:7px;color:var(--edit);text-align:center;margin-top:4px}
.wcap{font-size:10.5px;color:var(--dim);margin:0 0 10px}
.back{font-family:var(--mono);font-size:12px;color:var(--edit);background:none;border:none;padding:8px 0}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r2);padding:16px;margin-bottom:12px;box-shadow:inset 0 1px 0 rgba(255,255,255,.02)}
.r1{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.tick{font-family:var(--mono);font-size:22px;font-weight:700;letter-spacing:.02em}
select.state{font-family:var(--mono);font-size:11px;background:var(--panel2);color:var(--ink);border:1px solid var(--line);border-radius:8px;padding:6px 7px;margin-left:auto}
.pxwrap{display:flex;align-items:baseline;gap:8px;margin-top:11px;flex-wrap:wrap}
.pxlbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;font-weight:700}
input.px{font-family:var(--mono);font-size:21px;font-weight:600;color:var(--edit);background:transparent;border:none;border-bottom:1px dashed var(--edit);width:112px}
input.px:focus{outline:none;border-bottom-style:solid}
.conf{font-family:var(--mono);font-size:9px;font-weight:700;padding:3px 7px;border-radius:6px;letter-spacing:.04em}
.cLIVE{background:rgba(63,201,140,.15);color:var(--go)} .cVER{background:rgba(63,201,140,.1);color:var(--go)}
.cSEED{background:rgba(232,180,76,.12);color:var(--coil)} .cNONE{background:rgba(229,83,75,.14);color:var(--ext)}
.thesis{font-size:12.5px;color:var(--muted);margin-top:10px}
.thesis b{color:var(--ink)}
.gline{font-family:var(--mono);font-size:11px;margin-top:10px;color:var(--muted);line-height:1.6}
.note{margin-top:8px;font-size:11px;color:var(--coil)}
.runway{margin:14px 0 4px}
.rw-track{position:relative;height:26px}
.rw-line{position:absolute;top:12px;left:0;right:0;height:2px;background:var(--line)}
.rw-win{position:absolute;top:9px;height:8px;background:rgba(63,201,140,.26);border:1px solid rgba(63,201,140,.5);border-radius:4px}
.rw-win.closed{background:rgba(141,151,172,.14);border-color:var(--dim)}
.rw-now{position:absolute;top:4px;width:2px;height:18px;background:var(--ink)}
.rw-cat{position:absolute;top:7px;width:12px;height:12px;transform:rotate(45deg) translateX(-4px);background:var(--coil);border-radius:2px}
.rw-lbls{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9.5px;color:var(--dim);margin-top:3px}
.rw-cap{font-size:11px;color:var(--muted);margin-top:6px}
.rw-cap b{color:var(--ink)}
.spark{margin:14px 0 2px}
.spark svg{width:100%;height:56px;display:block}
.spark .cap{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9.5px;color:var(--dim);margin-top:3px}
.scn{display:flex;gap:8px;margin-top:12px}
.scn label{flex:1;text-align:center;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-weight:700}
.scn input{font-family:var(--mono);width:100%;text-align:center;font-size:14px;background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:7px 2px;color:var(--edit);margin-top:4px}
.scncap{font-size:10.5px;color:var(--dim);margin-top:6px}
table.setups{width:100%;border-collapse:collapse;margin-top:10px;font-family:var(--mono)}
table.setups th{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.08em;text-align:right;padding:5px 3px;border-bottom:1px solid var(--line);font-weight:700}
table.setups th:first-child{text-align:left}
table.setups td{font-size:11.5px;text-align:right;padding:8px 3px;border-bottom:1px solid var(--panel2);vertical-align:top}
table.setups td:first-child{text-align:left}
.stype{display:block;font-size:9px;color:var(--dim);margin-top:1px}
.grade{font-weight:700;padding:2px 8px;border-radius:6px;font-size:11px}
.gA{background:rgba(63,201,140,.18);color:var(--go)} .gB{background:rgba(232,180,76,.16);color:var(--coil)}
.gC{background:rgba(141,151,172,.14);color:var(--muted)} .gS{background:rgba(229,83,75,.12);color:var(--ext)}
.pos{color:var(--go)}.neg{color:var(--ext)}.flat{color:var(--muted)}
details.model{margin-top:12px}
details.model summary{font-family:var(--mono);font-size:11px;color:var(--dim);cursor:pointer;list-style:none}
details.model summary::before{content:"▸ "} details.model[open] summary::before{content:"▾ "}
.mrow{display:flex;gap:10px;margin-top:8px}
.mrow label{flex:1;font-size:10px;color:var(--muted)}
.mrow input{font-family:var(--mono);width:100%;font-size:13px;background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:6px;color:var(--edit);margin-top:3px}
.cal{display:flex;align-items:center;gap:10px;background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:11px 12px;margin-bottom:8px}
.cal .d{font-family:var(--mono);font-size:12px;width:58px;color:var(--ink)}
.cal .t{font-family:var(--mono);font-weight:700;width:52px}
.cal .l{flex:1;font-size:11.5px;color:var(--muted)}
.cal .cf{font-family:var(--mono);font-size:9px;font-weight:700;padding:3px 7px;border-radius:5px}
.cfC{background:rgba(63,201,140,.14);color:var(--go)} .cfE{background:rgba(232,180,76,.13);color:var(--coil)}
.rule{background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--coil);border-radius:var(--r);padding:13px;margin-bottom:10px;font-size:12.5px;color:var(--muted);line-height:1.6}
.rule b{color:var(--ink)}
footer{margin:16px 0 0;font-size:10px;color:var(--dim);line-height:1.6}
.ldbtn{font-family:var(--mono);font-size:11px;color:var(--edit);background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:7px 11px;margin-top:10px}
/* MESH tab */
.axis{margin-bottom:9px}
.axis .lab{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10.5px;color:var(--muted);margin-bottom:4px}
.axis .bar{height:7px;border-radius:4px;background:var(--panel2);overflow:hidden}
.axis .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--vio),rgba(157,140,255,.55));border-radius:4px}
.mrowx{display:flex;align-items:center;gap:9px;background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:10px 12px;margin-bottom:7px}
.mrowx .rk{font-family:var(--mono);font-size:10px;color:var(--dim);width:20px}
.mrowx .tk{font-family:var(--mono);font-weight:700;font-size:13.5px;width:52px}
.mrowx .ax{font-family:var(--mono);font-size:9px;color:var(--dim);width:78px}
.mrowx .eff{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--vio);width:46px;text-align:right}
.slicewrap{flex:1;height:10px;border-radius:5px;position:relative;background:var(--panel2);overflow:hidden}
.slicehatch{position:absolute;inset:0 auto 0 0;background:repeating-linear-gradient(135deg,rgba(157,140,255,.28) 0 3px,transparent 3px 6px);border-radius:5px}
.slicefill{position:absolute;inset:0 auto 0 0;background:var(--vio);border-radius:5px}

.stance{background:linear-gradient(135deg,var(--panel),var(--panel2));border:1px solid var(--line2);border-radius:var(--r2);padding:16px;margin-bottom:12px}
.stance .big{font-family:var(--mono);font-size:26px;font-weight:700;letter-spacing:.02em}
.stance .big b.bull{color:var(--go)} .stance .big b.bear{color:var(--ext)}
.stance .sub{font-family:var(--mono);font-size:10.5px;color:var(--muted);margin-top:6px;line-height:1.7}
.stance.killed{border-color:var(--ext);box-shadow:inset 0 0 0 1px rgba(229,83,75,.3)}
.band{display:flex;height:8px;border-radius:4px;overflow:hidden;margin:8px 0 2px;gap:1px}
.band i{flex:1;background:var(--line)}
.node{background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--vio);border-radius:var(--r);padding:12px;margin-bottom:10px}
.node.res{border-left-color:var(--go)}
.node .nd{font-family:var(--mono);font-size:10px;color:var(--dim);letter-spacing:.1em}
.node .ne{font-family:var(--mono);font-size:12.5px;font-weight:700;margin:3px 0 2px}
.node .nw{font-size:11px;color:var(--muted);margin-bottom:8px}
.nbr{display:block;width:100%;text-align:left;background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:8px 10px;margin-top:6px;color:var(--ink);transition:border-color .15s,opacity .15s}
.nbr:active{border-color:var(--edit)}
.nbr.fired{border-color:var(--go);background:rgba(63,201,140,.08)}
.nbr.dim{opacity:.35}
.nbr .r1x{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px}
.nbr .pb{flex:0 0 44px;height:6px;border-radius:3px;background:var(--line);overflow:hidden}
.nbr .pb i{display:block;height:100%;background:var(--edit)}
.nbr .side{font-weight:700;font-size:9.5px;padding:2px 7px;border-radius:5px}
.sBULL{background:rgba(63,201,140,.16);color:var(--go)} .sCHOP{background:rgba(141,151,172,.14);color:var(--muted)}
.sBEARM{background:rgba(232,180,76,.15);color:var(--coil)} .sBEAR{background:rgba(229,83,75,.15);color:var(--ext)}
.nbr .pxl{font-size:10.5px;color:var(--muted);margin-top:4px;line-height:1.5}
.nbr .adj{font-size:10px;color:var(--dim);margin-top:2px;font-family:var(--mono)}
.unres{font-family:var(--mono);font-size:10px;color:var(--dim);background:none;border:none;padding:4px 0;margin-top:4px}
</style>
</head>
