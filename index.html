  <div class="wcap">Your probabilities. Every EV, P(win), grade — including the BEST column → — recomputes when you change them.</div>`;
 return `<div class="chips">${chips}</div>${wrow}`+rows.map(({t,g})=>{
  const n=DB[t];const px=n.px?fmt$(n.px):"—";
  const days=g[2]==null?"":(g[2]>=0?`+${g[2]}d`:`${g[2]}d`);
  const b=bestSetup(t);
  const bcell=b?`<span class="grade g${b.grade}" style="font-size:9px;padding:1px 5px">${b.grade}</span> <span class="${b.ret>0?'pos':'neg'}">${(b.ret*100).toFixed(0)}%</span>`:`<span class="flat">—</span>`;
  return `<div class="row" onclick="go('name','${t}')">
   <span class="tk">${t}</span><span class="px">${px}</span>${stChip(n)}
   <span class="gt ${GCLS[g[0]]}">${g[0]}</span><span class="bs">${bcell}</span><span class="cd">${days}</span></div>`}).join("")+
  `<footer>Tap ⟳ refresh (top) to fetch this tier: prices + history + scanner states, all in-app via public relays (delayed data). BEST = top graded setup's EV under your weights. Tap a row for the runway + full setups. Not investment advice.</footer>`}
function runway(t){
 const c=CAT[t];if(!c||!c[0])return"";
 const catD=D(c[0]);const eo=new Date(catD-42*DAY),ec=new Date(catD-21*DAY);
 const t0=new Date("2026-07-02T00:00:00"),tEnd=D("2026-11-20"),span=tEnd-t0;
 const pct=x=>Math.min(100,Math.max(0,((x-t0)/span)*100));
 const nowP=pct(TODAY),shut=TODAY>ec,open=!shut&&TODAY>=eo;
 const days=Math.round((catD-TODAY)/DAY);
 const iso=d=>d.toISOString().slice(0,10);
 return `<div class="runway"><div class="rw-track"><div class="rw-line"></div>
  <div class="rw-win ${shut?'closed':''}" style="left:${pct(eo)}%;width:${Math.max(2,pct(ec)-pct(eo))}%"></div>
  <div class="rw-cat" style="left:${pct(catD)}%"></div><div class="rw-now" style="left:${nowP}%"></div></div>
  <div class="rw-lbls"><span>Jul 2</span><span>Aug</span><span>Sep</span><span>Oct</span><span>Nov 20</span></div>
  <div class="rw-cap">◆ <b>${c[1]}</b> — ${dshort(c[0])} <span style="color:${c[2]==='CONF'?'var(--go)':'var(--coil)'}">[${c[2]}]</span> · ${days}d · window ${dshort(iso(eo))}–${dshort(iso(ec))}: <b style="color:${open?'var(--go)':'var(--dim)'}">${shut?'CLOSED':open?'OPEN':'not yet'}</b></div></div>`}
function vName(){
 const t=CUR,n=DB[t],g=gate(t);
 const setups=setupsFor(t);
 const chips=["ALL"].concat(EXPIRIES).map(e=>`<span class="chip ${n.expSel===e?'on':''}" onclick="DB['${t}'].expSel='${e}';paint()">${e==="ALL"?"all exp":dshort(e)}</span>`).join("");
 const rows=setups.map(s=>{
  const rc=s.ret>0.01?"pos":s.ret<-0.01?"neg":"flat",fc=s.flat<-0.01?"neg":"flat";
  const be=s.be===null?"—":(s.be>=0?"+":"")+(s.be*100).toFixed(0)+"%";
  return`<tr><td><span class="mono">${dshort(s.exp)} ${s.label}</span><span class="stype">${s.typ}${s.r3ok?"":" · R3⚠"} · ${s.src}</span></td>
   <td class="flat">${fmt$(s.prem)}</td><td class="${rc}">${(s.ret*100).toFixed(0)}%</td>
   <td class="flat">${Math.round(s.pwin*100)}%</td><td class="flat">${be}</td>
   <td class="${fc}">${(s.flat*100).toFixed(0)}%</td>
   <td><span class="grade g${s.grade==="SKIP"?"S":s.grade}">${s.grade}</span></td></tr>`}).join("");
 const chainBtn=n.chainState==="live"?`<span class="conf cLIVE">CHAIN LIVE</span>`
  :n.chainState==="loading"?`<span class="conf cSEED">loading chain…</span>`
  :`<button class="ldbtn" onclick="loadChain('${t}')">load live option chain</button>`;
 return `<button class="back" onclick="go('brief')">‹ brief</button>
 <div class="card">
  <div class="r1"><span class="tick">${t}</span><span class="gt ${GCLS[g[0]]}" style="font-size:10px;padding:3px 8px;border-radius:5px">${g[0]}</span>
   ${n.rdy!==null?`<span class="mono" style="font-size:11px;color:var(--muted)">rdy ${n.rdy}</span>`:""}
   <select class="state mono" onchange="DB['${t}'].state=this.value;paint()">
    ${["COILED","BASING","EXTENDED","NOSETUP","VERIFY"].map(s=>`<option ${n.state===s?'selected':''}>${s}</option>`).join("")}</select></div>
  <div class="pxwrap"><span class="pxlbl">spot $</span>
   <input class="px mono" inputmode="decimal" value="${n.px??''}" placeholder="—" onchange="setPx('${t}',this.value)">
   <span class="conf c${n.conf}">${n.conf==="LIVE"?"LIVE":n.conf==="SEED"?"SEED — refresh":"NO PRICE — refresh or type"}</span>
   ${chainBtn}</div>
  <div class="thesis">${THESIS[t]||""}</div>
  <div class="gline">${g[1]}</div>
  ${n.snote?`<div class="note">! ${n.snote}</div>`:""}
  ${runway(t)}
  <div class="scn">
   <label>bear %<input inputmode="numeric" value="${n.scn.bear}" onchange="setScn('${t}','bear',this.value)"></label>
   <label>base %<input inputmode="numeric" value="${n.scn.base}" onchange="setScn('${t}','base',this.value)"></label>
   <label>bull %<input inputmode="numeric" value="${n.scn.bull}" onchange="setScn('${t}','bull',this.value)"></label></div>
  <div class="scncap">${n.scnAuto&&!n.touched?"auto-derived from this name's 20-day volatility × days-to-catalyst":"your override"} — these three numbers ARE the model: every EV / P(win) / b-e / grade below is computed from them.</div>
  <div class="chips" style="margin-top:12px">${chips}</div>
  ${n.px?`<table class="setups"><tr><th>setup</th><th>prem</th><th>EV</th><th>P(win)</th><th>b/e</th><th>flat</th><th>gr</th></tr>${rows||"<tr><td colspan=7 class='flat'>no dated catalyst</td></tr>"}</table>`:`<div class="gline" style="color:var(--ext)">No price — tap ⟳ refresh, or type one above.</div>`}
  <details class="model"><summary>model (IV ${n.iv}% ${n.chainState==="live"?"· chain IV used where present ":""}· crush ×${n.crush} · r 4%)</summary>
   <div class="mrow"><label>IV %<input inputmode="numeric" value="${n.iv}" onchange="setIV('${t}',this.value)"></label>
   <label>post-event IV ×<input inputmode="decimal" value="${n.crush}" onchange="setCr('${t}',this.value)"></label></div></details>
 </div>`}
function vCal(){
 const items=ALL.filter(t=>CAT[t]&&CAT[t][0]).map(t=>({t,d:CAT[t][0],l:CAT[t][1],c:CAT[t][2]}))
  .sort((a,b)=>a.d.localeCompare(b.d));
 return items.map(({t,d,l,c})=>{
  const days=Math.round((D(d)-TODAY)/DAY);
  return`<div class="cal" onclick="go('name','${t}')">
   <span class="d">${dshort(d)}<br><span style="color:var(--dim);font-size:9.5px">${days>=0?"+":""}${days}d</span></span>
   <span class="t">${t}</span><span class="l">${l}</span>
   <span class="cf ${c==="CONF"?"cfC":"cfE"}">${c}</span></div>`}).join("")+
  `<footer>Chronological catalyst spine. Amber EST dates: confirm T−7. Undated names are not listed by design: no date, no trade.</footer>`}
let TESTRES=null;
function _detSeries(){
 const n=170,ramp=130;let c=[10.0];
 for(let i=0;i<ramp;i++)c.push(c[c.length-1]*1.012);
 c=c.slice(1);const base=c[c.length-1];
 for(let k=0;k<n-ramp;k++){const amp=0.04*(1-k/(n-ramp));c.push(base*(1+0.0008*k)*(1+amp*Math.sin(k*1.05)))}
 const vol=Array(ramp).fill(1.5e6).concat([...Array(n-ramp)].map((_,k)=>1.5e6*(1.0-0.65*k/((n-ramp)-1))));
 return {Open:[c[0],...c.slice(0,-1)],High:c.map(x=>x*1.004),Low:c.map(x=>x*0.996),Close:c,Volume:vol};
}
async function systemTest(){
 TESTRES={logic:[],net:[],running:true};paint();
 const L=(name,ok,d="")=>TESTRES.logic.push({name,ok,d});
 // logic: scanner parity vs the Python-locked reference
 const s=scan(_detSeries());
 L("scanner parity (73.9 / COILED)",s&&s.state==="COILED — ready"&&Math.abs(s.readiness-73.9)<=0.11,s?s.readiness+" "+s.state:"null");
 // parsers
 const yp=_yhParse({chart:{result:[{meta:{regularMarketPrice:17.05},indicators:{quote:[{open:[10,11,null],high:[10.2,11.2,12],low:[9.9,10.9,11],close:[10.1,11.1,12.1],volume:[1e6,1e6,1e6]}]}}]}});
 L("yahoo parser",yp.df.Close.length===2&&yp.px===17.05);
 const cb=_cboeParse({data:{options:[{option:"MRVL260821C00280000",bid:10,ask:11,iv:0.55}]}});
 L("cboe parser",cb.length===1&&cb[0].K===280&&cb[0].iv===55);
 L("spark parser",(_sparkParse({spark:{result:[{symbol:"AAPL",response:[{meta:{regularMarketPrice:230.5}}]}]}}).AAPL===230.5));
 // engine on pinned inputs (snapshot -> test -> restore)
 const snapN=JSON.parse(JSON.stringify({px:DB.MRVL.px,state:DB.MRVL.state,scn:DB.MRVL.scn,iv:DB.MRVL.iv,crush:DB.MRVL.crush,expSel:DB.MRVL.expSel}));
 const snapC=DB.MRVL.chain,snapW={...W};
 Object.assign(DB.MRVL,{px:274,state:"COILED",scn:{bear:-12,base:10,bull:22},iv:55,crush:0.8,expSel:"ALL",chain:null});
 W={bear:.30,base:.45,bull:.25};
 const su=setupsFor("MRVL");
 const sp=su.find(x=>x.typ==="CALL SPREAD");
 L("engine known-value (280/315C ≈ A, EV≈+68%)",!!sp&&["A","B"].includes(sp.grade)&&Math.abs(sp.ret-0.68)<0.15,sp?sp.label+" "+sp.grade+" "+(sp.ret*100).toFixed(0)+"%":"none");
 L("trap row (SKIP) shown",su.some(x=>x.grade==="SKIP"));
 Object.assign(DB.MRVL,snapN);DB.MRVL.chain=snapC;W=snapW;
 L("gate: undated = NO-DATE",gate("QBTS")[0]==="NO-DATE",gate("QBTS")[0]);
 // connectivity probes (device truth)
 const probe=async(name,fn)=>{const t0=Date.now();try{await fn();return{name,ok:true,ms:Date.now()-t0}}catch(e){return{name,ok:false,ms:Date.now()-t0}}};
 const tiny="https://query1.finance.yahoo.com/v8/finance/chart/AAPL?range=1d&interval=1d";
 const probes=await Promise.all([
  probe("relay corsproxy",()=>fetchOnce(PROXIES[0](tiny),6000)),
  probe("relay allorigins",()=>fetchOnce(PROXIES[1](tiny),6000)),
  probe("relay codetabs",()=>fetchOnce(PROXIES[2](tiny),6000)),
  probe("spark batch",()=>getJSON("https://query1.finance.yahoo.com/v8/finance/spark?symbols=AAPL,MSFT&range=1d&interval=1d")),
  probe("cboe chain (direct)",()=>fetchOnce("https://cdn.cboe.com/api/global/delayed_quotes/options/AAPL.json",6000)),
 ]);
 TESTRES.net=probes;TESTRES.running=false;paint();
}
function testPanel(){
 if(!TESTRES)return `<button class="ldbtn" onclick="systemTest()">run system test — logic + connectivity</button>`;
 const lg=TESTRES.logic.map(x=>`<div style="font-family:var(--mono);font-size:11px;color:${x.ok?'var(--go)':'var(--ext)'}">${x.ok?'✓':'✗'} ${x.name}${x.d?' · '+x.d:''}</div>`).join("");
 const nt=TESTRES.running?'<div class="mono" style="font-size:11px;color:var(--dim)">probing relays…</div>'
  :TESTRES.net.map(x=>`<div style="font-family:var(--mono);font-size:11px;color:${x.ok?'var(--go)':'var(--ext)'}">${x.ok?'✓':'✗'} ${x.name} · ${x.ms}ms</div>`).join("");
 const lok=TESTRES.logic.every(x=>x.ok);
 return `<div class="rule" style="border-left-color:${lok?'var(--go)':'var(--ext)'}"><b>SYSTEM TEST</b><br>${lg}<div style="margin-top:6px"><b style="font-size:11px">connectivity (your device):</b></div>${nt}<button class="ldbtn" onclick="systemTest()">re-run</button></div>`;
}
function vRules(){
 return testPanel()+`<div class="rule"><b>How this app works (fully standalone).</b> Tap ⟳: it fetches delayed prices + 1y history per name through public relay endpoints, runs the breakout scanner in your browser, sets states, and auto-derives each name's bear/base/bull from its own volatility. Open a name → "load live option chain" prices setups off the real (delayed) CBOE chain. No terminal, no install. Share the file itself — it carries the whole system.</div>
 <div class="rule"><b>The two-layer gate.</b> Thesis-ready (dated catalyst ≤45d) × COILED (scanner) = GO. One layer alone = watch, never a position.</div>
 <div class="rule"><b>Your three numbers per name.</b> bear/base/bull = the price moves you believe the catalyst can produce. Auto-seeded from live volatility; edit them and watch every EV, P(win), grade and the Brief's BEST column move. The weights row (top of Brief) = how likely you think each case is.</div>
 <div class="rule"><b>R3 · duration ≥ 3× lead.</b> R3⚠ rows are flagged breaches — weeklies can't hold a 1-month lead.</div>
 <div class="rule"><b>R4 · sleeves.</b> LOTTO + undated stories ≤5% total, never refilled. Catalyst sleeve ≤30% aggregate premium.</div>
 <div class="rule"><b>R5 · the news is the exit.</b> Sell 50% into first strength; the post-catalyst flip to EXTENDED is take-profit confirmation, never an add.</div>
 <div class="rule"><b>R6/R8/R9.</b> Commissions ≤1%/mo; journal every exit; two dead catalyst cycles → shares-only.</div>
 <div class="rule" style="border-left-color:var(--ext)"><b>Honest limits.</b> Data is delayed public data via third-party relays — they can throttle or die (three fallbacks built in; the old Termux feed still works as a backup and is auto-merged if present). Model EVs are outputs of YOUR scenarios, not forecasts. The app names and grades; you size. Not investment advice.</div>`}
function paint(){
 document.getElementById("view").innerHTML=VIEW==="brief"?vBrief():VIEW==="name"?vName():VIEW==="cal"?vCal():vRules();
 ["nb","nc","nr"].forEach(id=>document.getElementById(id).classList.remove("on"));
 document.getElementById(VIEW==="cal"?"nc":VIEW==="rules"?"nr":"nb").classList.add("on");
 window.scrollTo(0,0)}
window.setPx=(t,v)=>{const x=parseFloat(v);if(x>0){DB[t].px=x;DB[t].conf="LIVE";paint()}};

window.setCr=(t,v)=>{const x=parseFloat(v);if(x>0){DB[t].crush=x;paint()}};

window.setW=(k,v)=>{const x=Math.max(0,parseFloat(v)||0);W[k]=x;const s=W.bear+W.base+W.bull||1;W={bear:W.bear/s,base:W.base/s,bull:W.bull/s};paint()};
if(window.FEED&&FEED.quotes&&Object.keys(FEED.quotes).length){
 const tg=document.getElementById("feedtag");tg.textContent="LIVE";tg.className="feedtag live";
 setHdr("feed "+FEED.asof+" merged · tap ⟳ for fresh in-app data");
}
paint();
</script>
