name: daily-feed
on:
  schedule:
    - cron: "15 21 * * 1-5"
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  feed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install requests
      - name: run feed (tee log)
        run: |
          set -o pipefail
          python -X faulthandler irftek.py feed --tier terminal 2>&1 | tee feed.log
        continue-on-error: true
      - name: commit results + log
        if: always()
        run: |
          git config user.name "irftek-bot"
          git config user.email "bot@irftek.local"
          git add -f feed.log terminal_data.js 2>/dev/null || git add -f feed.log
          git commit -m "feed $(date -u +%F_%H:%M)" || echo "no change"
          git push
